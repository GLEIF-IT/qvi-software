<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QVI Software - Recommended Versions</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #003336;
      line-height: 1.6;
      padding: 0;
      margin: 0;
      background: #f8fafa;
    }

    .banner {
      background: #003336;
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .banner img {
      height: 40px;
      width: auto;
    }

    .banner h1 {
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .banner .subtitle {
      color: #51DAC5;
      font-size: 0.85rem;
      font-weight: 400;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #0A4D4F;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #51DAC5;
    }

    section { margin-bottom: 2.5rem; }

    table { width: 100%; border-collapse: collapse; }

    td {
      padding: 0.6rem 0;
      border-bottom: 1px solid #e8eded;
      vertical-align: baseline;
    }

    td:first-child {
      font-weight: 500;
      width: 40%;
      color: #003336;
    }

    td:nth-child(2) { text-align: right; }

    a { color: #0A4D4F; text-decoration: none; font-weight: 500; }
    a:hover { color: #51DAC5; }

    .artifacts {
      display: inline-flex;
      gap: 0.75rem;
      margin-left: 0.75rem;
    }

    .artifacts a {
      font-size: 0.75rem;
      color: #51DAC5;
      font-weight: 400;
    }

    .artifacts a:hover { color: #003336; }

    footer {
      max-width: 640px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      border-top: 1px solid #e8eded;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    footer a { color: #51DAC5; font-weight: 400; }
  </style>
</head>
<body>
  <div class="banner">
    <img src="logo.png" alt="GLEIF">
    <div>
      <h1>QVI Software</h1>
      <span class="subtitle">Recommended versions</span>
    </div>
  </div>
  <main>
    <div id="sections"></div>
  </main>
  <footer>
    Source: <a href="recommended_versions.json">recommended_versions.json</a>
  </footer>

  <script>
    fetch('recommended_versions.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('sections');

        for (const sectionKey of ['gleif', 'qvi']) {
          const section = data[sectionKey];
          if (!section) continue;

          const el = document.createElement('section');
          let rows = '';

          for (const [, c] of Object.entries(section.components)) {
            let artifacts = '';
            if (c.container) {
              artifacts += `<a href="${c.container.url}">docker</a>`;
            }
            if (c.npm) {
              artifacts += `<a href="${c.npm.url}">npm</a>`;
            }
            const artifactHtml = artifacts ? `<span class="artifacts">${artifacts}</span>` : '';

            rows += `<tr>
              <td>${c.name}</td>
              <td><a href="${c.release}">${c.package} ${c.version}</a>${artifactHtml}</td>
            </tr>`;
          }

          el.innerHTML = `<h2>${section.title}</h2><table>${rows}</table>`;
          container.appendChild(el);
        }
      });
  </script>
</body>
</html>
