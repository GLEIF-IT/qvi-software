<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QVI Software - Recommended Versions</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card-bg: #f9fafb;
      --accent: #2563eb;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --container-bg: #f0fdf4;
      --container-text: #166534;
      --npm-bg: #fef3c7;
      --npm-text: #92400e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
      max-width: 880px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      background: var(--card-bg);
    }

    .card-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: var(--badge-bg);
      color: var(--badge-text);
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.9rem;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .detail-label {
      color: var(--muted);
      min-width: 5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .tag {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .tag-container {
      background: var(--container-bg);
      color: var(--container-text);
    }

    .tag-npm {
      background: var(--npm-bg);
      color: var(--npm-text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>QVI Software</h1>
    <p class="subtitle">GLEIF tested versions for technical dry runs</p>
  </header>
  <div class="grid" id="components"></div>
  <footer>
    Source: <a href="recommended_versions.json">recommended_versions.json</a>
  </footer>

  <script>
    fetch('recommended_versions.json')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('components');
        for (const [key, c] of Object.entries(data.components)) {
          const card = document.createElement('div');
          card.className = 'card';

          let details = `
            <div class="detail-row">
              <span class="detail-label">Release</span>
              <a href="${c.release}">${c.package} ${c.version}</a>
            </div>`;

          if (c.container) {
            details += `
            <div class="detail-row">
              <span class="detail-label">Image</span>
              <a href="${c.container.url}"><span class="tag tag-container">${c.container.image}</span></a>
            </div>`;
          }

          if (c.npm) {
            details += `
            <div class="detail-row">
              <span class="detail-label">NPM</span>
              <a href="${c.npm.url}"><span class="tag tag-npm">${c.npm.package}</span></a>
            </div>`;
          }

          card.innerHTML = `
            <div class="card-header">
              <span class="card-name">${c.name}</span>
              <span class="badge">${c.version}</span>
            </div>
            <div class="details">${details}</div>`;

          grid.appendChild(card);
        }
      });
  </script>
</body>
</html>
