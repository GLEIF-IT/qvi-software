<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QVI Software - Recommended Versions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a2e;
      line-height: 1.6;
      padding: 3rem 1.5rem;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }
    .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 2.5rem; }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    section { margin-bottom: 2rem; }

    table { width: 100%; border-collapse: collapse; }

    td {
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: baseline;
    }

    td:first-child {
      font-weight: 500;
      width: 40%;
    }

    td:nth-child(2) { text-align: right; }

    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .artifacts {
      display: inline-flex;
      gap: 0.75rem;
      margin-left: 0.75rem;
    }

    .artifacts a {
      font-size: 0.75rem;
      color: #6b7280;
    }

    .artifacts a:hover { color: #2563eb; }

    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>QVI Software</h1>
  <p class="subtitle">Recommended versions for technical dry runs</p>
  <div id="sections"></div>
  <footer>
    Source: <a href="recommended_versions.json">recommended_versions.json</a>
  </footer>

  <script>
    fetch('recommended_versions.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('sections');

        for (const sectionKey of ['gleif', 'qvi']) {
          const section = data[sectionKey];
          if (!section) continue;

          const el = document.createElement('section');
          let rows = '';

          for (const [, c] of Object.entries(section.components)) {
            let artifacts = '';
            if (c.container) {
              artifacts += `<a href="${c.container.url}">docker</a>`;
            }
            if (c.npm) {
              artifacts += `<a href="${c.npm.url}">npm</a>`;
            }
            const artifactHtml = artifacts ? `<span class="artifacts">${artifacts}</span>` : '';

            rows += `<tr>
              <td>${c.name}</td>
              <td><a href="${c.release}">${c.package} ${c.version}</a>${artifactHtml}</td>
            </tr>`;
          }

          el.innerHTML = `<h2>${section.title}</h2><table>${rows}</table>`;
          container.appendChild(el);
        }
      });
  </script>
</body>
</html>
